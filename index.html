<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Medidores</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Controle de Medidores</h1>
        </header>
        <main>
            <div class="form-container">
                <h2>Adicionar Novo Medidor</h2>
                <form id="medidor-form">
                    <div class="input-group">
                        <label for="numero-medidor">Número do Medidor</label>
                        <input type="text" id="numero-medidor" placeholder="Ex: 12345678" required>
                    </div>
                    <div class="input-group">
                        <label for="leitura-atual">Leitura Atual (kWh )</label>
                        <input type="number" id="leitura-atual" placeholder="Ex: 54321" required>
                    </div>
                    <div class="input-group">
                        <label for="data-leitura">Data da Leitura</label>
                        <input type="date" id="data-leitura" required>
                    </div>
                    <button type="submit" class="btn">Salvar Leitura</button>
                </form>
            </div>
            <div class="list-container">
                <h2>Histórico de Leituras</h2>
                <div id="lista-medidores">
                    <!-- As leituras serão inseridas aqui pelo JavaScript -->
                    <p class="empty-state">Nenhuma leitura registrada ainda.</p>
                </div>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 - Seu Nome ou Nome da Empresa</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
